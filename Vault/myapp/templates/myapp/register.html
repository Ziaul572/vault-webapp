{% extends "myapp/base.html" %}
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | VAULT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


</head>
<body class="auth-body">
     {% block content %}
    <div class="auth-container">
        <div class="auth-card">

            <!-- Clickable Vault Logo -->
            <a href="index.html" class="logo-link">
                <img src="{% static 'myapp/assets/images/vault_logo.svg' %}" alt="VAULT Logo" class="auth-logo">
            </a>

            <!-- Punchline -->
            <p class="auth-tagline">Secure digital banking made simple.</p>

            <h4 class="auth-title">Create Account</h4>

            <!-- Registration Form -->
            <form action="{% url 'myapp:register' %}" method="POST" class="mt-4">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="fullname">Full Name</label>
                    <input type="text" class="form-control" name="username" placeholder="John Doe" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" class="form-control" name="email" placeholder="you@example.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="dob">Date of Birth</label>
                    <input type="date" class="form-control" name="dob" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <input type="password" class="form-control" name="confirm_password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Create Account</button>
            </form>

            <!-- Footer links -->
            <div class="auth-footer">
                <p>Already have an account? <a href="loginPage.html">Login</a></p>
            </div>

        </div>
    </div>

    {% endblock %}
</body>
</html>
