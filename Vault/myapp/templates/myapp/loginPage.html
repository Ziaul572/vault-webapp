{% extends "myapp/base.html" %}

{% load static %}



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | VAULT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">



</head>
<body class="auth-body">
    {% block content %} 
    <div class="auth-container">
        <div class="auth-card">

            <!-- Clickable Vault Logo -->
            <a href="index.html" class="logo-link">
                <img src="{% static 'myapp/assets/images/vault_logo.png' %}" alt="VAULT Logo" class="auth-logo">
            </a>

            <!-- Punchline -->
            <p class="auth-tagline">Secure digital banking made simple.</p>

            <h4 class="auth-title">Login</h4>

            <!-- Login Form -->
            <form  method="POST" class="mt-4">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" class="form-control" name="email" placeholder="you@example.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                </div>

                <div class="d-flex justify-content-between mb-3">
                    <a href="#" class="small-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                <p>Don't have an account? <a href="{% url 'myapp:register' %}">Create Account</a></p>
            </div>

        </div>
    </div>
    {% endblock %}
</body>
</html>
