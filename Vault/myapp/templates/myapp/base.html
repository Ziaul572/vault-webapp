{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Vault Bank</title>

    <link rel="stylesheet" href="{% static 'myapp/css/main.css' %}">
    <link rel="stylesheet" href="{% static 'myapp/css/navbar.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Authentication Layout CSS -->
    <link rel="stylesheet" href="{% static 'myapp/css/auth.css' %}">
    <!-- Form CSS -->
    <link rel="stylesheet" href="{% static 'myapp/css/form.css' %}">

    <link rel="stylesheet" href="{% static 'myapp/css/accounts.css' %}">
    <!-- Transactions CSS -->
    <link rel="stylesheet" href="{% static 'myapp/css/transaction.css' %}">

    <link rel="stylesheet" href="{% static 'myapp/css/transfer.css' %}">
</head>

<body>

    
<!-- ================= NAVIGATION BAR ================= -->
    <!-- Contains logo and navigation links -->
     {% block navbar %}

<nav class="navbar navbar-expand-lg ">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'myapp:home' %}">VAULT</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#vaultNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="vaultNav">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="{% url 'myapp:home' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#services">Services</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'myapp:login' %}">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link btn btn-light text-primary ms-lg-3 px-3" href="{% url 'myapp:register' %}">
                        Open Account
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

{% endblock %}

{% block content %}

{% endblock %}

</body>
</html>
