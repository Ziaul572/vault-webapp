{% extends "myapp/base.html" %}
{% load static %}

{% block navbar %}

        <nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'myapp:dashboard' %}">VAULT</a>

        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link " href="{% url 'myapp:dashboard' %}">Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{% url 'myapp:accounts' %}">Accounts</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{% url 'myapp:transactions' %}">Transactions</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{% url 'myapp:loans' %}">Loans</a>
            </li>
            <li class="nav-item">
                <a class="nav-link-logout nav-link" href="{% url 'myapp:logout' %}">Logout</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="">       </a>
            </li>
            <a class="nav-link" href="{% url 'myapp:profile' %}">
                    {{ request.user.username }}
                </a>
        </ul>
    </div>
</nav>

{% endblock %}

{% block content %}

<main class="banking-container">

<form class="banking-form" method="post">
{% csrf_token %}

<h1>Deposit Money</h1>
<p class="subtitle">Add funds to your account</p>

<div class="form-group">
<label>Account</label>
<select name="account">
{% for account in accounts %}
<option value="{{ account.id }}">
{{ account.get_account_type_display }} - €{{ account.balance }}
</option>
{% endfor %}
</select>
</div>

<div class="form-group">
<label>Amount (€)</label>
<input type="number" step="0.01" name="amount">
</div>

<div class="form-actions">
<button type="submit" class="btn-primary">Deposit</button>
<a href="{% url 'myapp:dashboard' %}" class="btn-secondary">Cancel</a>
</div>

</form>

</main>

{% endblock %}
