{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>myapp | {% block title %}{% endblock %}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="myapp Web Application">

  <link href="{% static 'myapp/css/style.css' %}" rel="stylesheet" type="text/css" />
  {% block extra_css %}{% endblock %}
</head>

<body>
  <nav>
    <ul>
      <li><a href="{% url 'myapp:index' %}">Home</a></li>
      <li><a href="{% url 'myapp:blogpost_list' %}">Blog Posts</a></li>
    </ul>
  </nav>

  <div class="content">
    {% block content %}(no content){% endblock %}
  </div>

  <script src="{% static 'myapp/js/script.js' %}"></script>
  {% block extra_script %}{% endblock %}
</body>
