{% extends 'myapp/base.html' %}

{% block title %}Blog Posts{% endblock %}

{% block content %}
    <h1>Blog Posts</h1>

    {% for blogpost in blogpost_list %}
      <li>
        <a href="{% url 'myapp:blogpost_detail' blogpost.id %}">{{ blogpost.title }}</a>
      </li>
    {% endfor %}

    <hr/>
    <a href="{% url 'myapp:blogpost_create' %}">Create new blogpost</a>
{% endblock %}
